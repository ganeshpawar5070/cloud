<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Start Tunnel</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <button onclick="startTunnel()">START</button>
    <p id="status"></p>

    <script>
        const WORKER_URL = "https://bitter-sound-0ae9.ganeshpawar5070.workers.dev/";

        async function startTunnel() {
            const statusEl = document.getElementById("status");
            statusEl.innerText = "Triggering Action...";
            
            try {
                const response = await fetch(WORKER_URL, { method: "POST" });
                if (response.ok) {
                    statusEl.innerText = "✅ Action Triggered Successfully!";
                } else {
                    statusEl.innerText = "❌ Failed to trigger (Check Worker Code/Token).";
                }
            } catch (err) {
                statusEl.innerText = "❌ Error: " + err.message;
            }
        }
    </script>

</body>
</html>
