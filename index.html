<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

#container{
    text-align:center;
}

#startBtn{
    padding:15px 45px;
    font-size:22px;
    cursor:pointer;
}

#count{
    font-size:80px;
    font-weight:bold;
    margin-top:20px;
}

#result{
    margin-top:20px;
    font-size:20px;
}

#result a{
    color:blue;
    text-decoration:none;
}
</style>
</head>
<body>

<div id="container">
    <button id="startBtn">START</button>
    <div id="count"></div>
    <div id="result"></div>
</div>

<script>

const triggerURL = "https://bitter-sound-0ae9.ganeshpawar5070.workers.dev/";

document.getElementById("startBtn").addEventListener("click", function(){

    // Button hide
    this.style.display = "none";

    // Trigger URL hit
    fetch(triggerURL, {
        method: "GET",
        mode: "no-cors"
    }).catch(() => {});

    let count = 1;
    const countDiv = document.getElementById("count");

    countDiv.textContent = count;

    const timer = setInterval(() => {

        count++;

        if(count <= 10){
            countDiv.textContent = count;
        }

        if(count > 10){

            clearInterval(timer);

            // 10 second ke baad hi control.json read hogi
            fetch("control.json")
            .then(response => response.json())
            .then(data => {

                countDiv.style.display = "none";

                document.getElementById("result").innerHTML =
                    `<a href="${data.url}" target="_blank">${data.url}</a>`;

            })
            .catch(err => {

                document.getElementById("result").innerHTML =
                    "control.json load nahi hui.";

                console.error(err);

            });

        }

    },1000);

});

</script>

</body>
</html>
