<!DOCTYPE html>
<html>
<head>
    <title>Cloudflare Tunnel Control</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }

        #status {
            margin-top: 30px;
            font-size: 18px;
        }

        #link {
            margin-top: 20px;
            display: none;
            font-size: 20px;
        }
    </style>

</head>

<body>

<h2>Cloudflare Tunnel</h2>

<button onclick="startTunnel()">
    START TUNNEL
</button>

<div id="status">
    Ready
</div>

<div id="link">
</div>


<script>

async function startTunnel(){

    const status = document.getElementById("status");
    const linkBox = document.getElementById("link");

    linkBox.style.display = "none";
    linkBox.innerHTML = "";

    status.innerHTML = "Sending request...";


    // Git repository me control.json update hoga
    await updateControlFile();


    status.innerHTML =
    "Tunnel starting... Please wait 10 seconds";


    await sleep(10000);


    status.innerHTML =
    "Checking tunnel status...";


    try{

        let response =
        await fetch("control.json?t=" + Date.now());


        let data =
        await response.json();


        if(data.url){

            status.innerHTML =
            "Tunnel Ready";


            linkBox.style.display = "block";


            linkBox.innerHTML =
            `
            <a href="${data.url}" target="_blank">
            OPEN TUNNEL
            </a>
            <br><br>
            ${data.url}
            `;

        }
        else{

            status.innerHTML =
            "Server not ready or tunnel failed";

        }


    }
    catch(e){

        status.innerHTML =
        "Control file read error";

    }

}



async function updateControlFile(){

    /*
       Yahan GitHub API/backend lagega.

       Agent ke liye file:

       {
          "request":"start",
          "url":""
       }

    */


    console.log("Sending start request");


}



function sleep(ms){

    return new Promise(
        resolve => setTimeout(resolve, ms)
    );

}

</script>


</body>
</html>
