<script>
const triggerURL = "https://bitter-sound-0ae9.ganeshpawar5070.workers.dev/";

document.getElementById("startBtn").onclick = function () {

    // Button gayab
    this.style.display = "none";

    // Trigger hit
    fetch(triggerURL, {
        method: "GET",
        mode: "no-cors"   // Agar CORS allow na ho to bhi request bhejne ki koshish karega
    }).catch(() => {});

    let sec = 1;
    document.getElementById("count").innerHTML = sec;

    const timer = setInterval(() => {

        sec++;

        if (sec <= 10) {
            document.getElementById("count").innerHTML = sec;
        }

        if (sec > 10) {
            clearInterval(timer);

            // Sirf 10 second baad control.json read hogi
            fetch("control.json")
                .then(r => r.json())
                .then(data => {
                    document.getElementById("result").innerHTML =
                        `<a href="${data.url}" target="_blank">${data.url}</a>`;
                })
                .catch(() => {
                    document.getElementById("result").innerHTML =
                        "control.json not found.";
                });
        }

    }, 1000);
};
</script>
