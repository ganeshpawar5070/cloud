<!DOCTYPE html>
<html>
<head>
    <title>Cloudflare Tunnel Control</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }

        #status {
            margin-top: 30px;
            font-size: 18px;
        }

        #link {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h2>Cloudflare Tunnel</h2>

<button onclick="checkTunnel()">
    START TUNNEL
</button>

<div id="status">
    Ready
</div>

<div id="link"></div>


<script>

async function checkTunnel(){

    const status = document.getElementById("status");
    const linkBox = document.getElementById("link");

    linkBox.innerHTML = "";

    status.innerHTML =
        "Waiting 10 seconds...";

    await sleep(10000);


    status.innerHTML =
        "Checking tunnel URL...";


    try {

        let response =
        await fetch("control.json?t=" + Date.now());


        let data =
        await response.json();


        if(data.url){

            status.innerHTML =
            "Tunnel Ready";


            linkBox.innerHTML =
            `
            <a href="${data.url}" target="_blank">
            OPEN TUNNEL
            </a>
            <br><br>
            ${data.url}
            `;

        }
        else{

            status.innerHTML =
            "No tunnel URL found";

        }


    }
    catch(error){

        status.innerHTML =
        "Error reading control.json";

    }

}



function sleep(ms){

    return new Promise(
        resolve => setTimeout(resolve, ms)
    );

}

</script>

</body>
</html>
